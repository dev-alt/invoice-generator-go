version: '3.8'
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_URL=postgresql://user:password@db:5432/invoices?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-very-secure-secret-key
      - FILE_STORAGE_PATH=/app/storage/files
    depends_on:
      - db
      - redis
    volumes:
      - ./storage/files:/app/storage/files

  db:
    image: postgres:14
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=invoices
    ports:
      - "5432:5432"
    volumes:
      - postgres-db:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-db:
    driver: local
  redis-data:
    driver: local